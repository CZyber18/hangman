<!doctype html>
<html lang="en">

<head>
    <title>Hangman</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">

    <link rel="stylesheet" href="css/style.css">

    <script src="scripts/Word.js" defer></script>
    <script src="scripts/hangman.js" defer></script>
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>Hangman</h1>
        </header>
        <main>
            <div id="game_container">
                <div id="game_display_box">
                    <div class="center">
                        <div id="animate">
                            <img src="images/snoopy1.png" alt="Image of Snoopy Sleeping on the Roof" id="hangman_img">
                        </div>
                        <div id="game_result"></div>
                        <div id="letter_display"></div>
                        <div id="hint"></div>
                        <p id="status_message" class="incorrect">Incorrect Guesses: 0 / 7</p>
                        <button id="new_game_btn">New Game</button>
                        <div class="keyboard" id="keyboard"></div>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p> 2026 Carol Zeng </p>
        </footer>
    </div>
</body>

</html>
